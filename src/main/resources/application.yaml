#spring.application.name=04-TransactionsService
#
#spring.datasource.username=root
#spring.datasource.password=root123
#spring.datasource.url=jdbc:mysql://localhost:3306/transactions_db
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#
#logging.file.name=logs/accounts.log
#
#server.port=8082
spring:
    application:
      name: "transaction-service"
    datasource:
      username: root
      password: root123
      url: jdbc:mysql://localhost:3306/transactions_db
      driver-class-name: com.mysql.cj.jdbc.Driver
    config:
     import: "optional:configserver:http://localhost:8071"
    profiles:
      active:
        - uat
cloud:                  #enable circuit breaker for feign client
  openfeign:
    circuitbreaker:
      enabled: true
server:
  port: 8082
logging:
  file:
    name: logs/transactions.log 
#Custom properties -Used in application
build:
    version: "1.0.3"
transactions:
    message: "Welcome to MSEDCL Bank Transactions REST API -DEV"
    contactDetails:
      name: "John"
      email: "john@yopmail.com"
    onCallSupport:
       - 123456890
       - 852149632
eureka:
   #instance:
   #  prefer-ip-address: true     
   client:
     fetch-registry: true
     register-with-eureka: true
     service-url: 
         defaultZone: http://localhost:8070/eureka
#Enable actuator endpoints
management:
   endpoints:
     web:
       exposure:
         include: "*"
#Circuit Breaker Configuration
resilience4j:
   circuitbreaker:
     configs:
         default:
            slidingWindowSize: 10 #Circuit breaker will consider last 10 calls to calculate failure rate
            permitted-number-of-calls-in-half-open-state: 2 #Number of test calls allowed in hal-open state
            failure-rate-threshold: 50 #If failure % >= 50%,circuite will open
            wait-duration-in-open-state: 1000  #How long circuit breaker stays OPEN before
